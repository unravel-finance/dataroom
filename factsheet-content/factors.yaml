    effect: >-
      Systematically buys recent underperformers and sells outperformers across
      a diversified set of look-back windows.
    long_description: |
      Mean Reversion is a basket-based signal diversified across different
      windows to capture reversal dynamics and statistical arbitrage
      opportunities in crypto assets.

      The asset universe consists of the most liquid and actively traded assets,
      identified on a rolling basis — various techniques are employed to keep it
