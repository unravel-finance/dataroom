  - id: momentum
    name: Momentum
    portfolio_id: momentum.40
    default_universe: "40"
    badges: [Market-Neutral, Survivorship-Bias Free, Single-Factor]
    category: Momentum
    short_description: >-
      Captures short-term momentum opportunities, aiming for uncorrelated
      returns while minimising directional exposure.
    effect: >-
      Classic cross-sectional momentum tailored to crypto's short half-life:
      longs the leaders, shorts the laggards, market-neutral.
    long_description: |
      The market-neutral momentum portfolio is designed to exploit
      cross-sectional price inefficiencies in the crypto market, capturing
      short-term, asset-specific momentum signals. By maintaining balanced long
      and short exposures, it aims to deliver alpha while minimising sensitivity
      to broader market movements.

      Its universe consists of the most liquid and actively traded assets,
      identified on a rolling basis — various techniques are employed to keep it
      both stable and relevant, as well as survivorship-bias free.

      The factor is available (point-in-time) with hourly updates, 5 minutes
      past the hour (UTC).
