  - id: trend_longonly_adaptive
    name: Trend Consensus Adaptive (Long-Only)
    portfolio_id: trend_longonly_adaptive.40
    default_universe: "40"
    badges: [Long-Only, Survivorship-Bias Free, Single-Factor]
    category: Trend / Long-Only
    short_description: >-
      Exploits the tendency of assets with positive trend consensus, when the
      overall market trend is positive.
    effect: >-
      Long-only exposure to the strongest-trending assets, gated by a
      market-wide regime filter — gross exposure goes to zero in adverse
      markets.
    long_description: |
      Trend Consensus Adaptive is designed to exploit the asymmetric positive
      expected returns of assets with positive trend consensus. It longs the top
      sextile (top 20%) of assets with the highest Trend Consensus, when the
      overall market trend is positive. It does not have any short exposure.

      Unlike other portfolios, Trend Consensus Adaptive is long-only and is
      displayed here with 100% target gross exposure.

      The asset universe consists of the most liquid and actively traded assets,
      identified on a rolling basis — various techniques are employed to keep it
      both stable and relevant, as well as survivorship-bias free.

      The factor is available (point-in-time) with hourly updates, 5 minutes
      past the hour (UTC).

  - id: carry_enhanced
    name: Enhanced Carry
    portfolio_id: carry_enhanced.40
    default_universe: "40"
    badges: [Market-Neutral, Survivorship-Bias Free, Single-Factor]
    category: Carry
    short_description: >-
      Captures cross-sectional funding premium across a wide range of exchanges,
      exploiting funding imbalances.
    effect: >-
      Earns the funding-rate premium plus the statistical inefficiency that
      surrounds it, aggregated across 10 venues rather than a single exchange.
    long_description: |
      The market-neutral carry portfolio is designed to exploit funding
      premiums, in large part capturing the associated statistical
      inefficiencies — in addition to the funding payments themselves. The
      factor is calculated by ingesting funding rates from the top 10 most
      reputable exchanges, avoiding reliance on any specific venue alone.

      The asset universe consists of the most liquid and actively traded assets,
      identified on a rolling basis — various techniques are employed to keep it
      both stable and relevant, as well as survivorship-bias free.

      The factor is available (point-in-time) with hourly updates, 5 minutes
