name: Generate Notebooks

on:
  workflow_dispatch:

  schedule:
    - cron: '0 6 * * 1'

  push:
    branches:
      - main
      # TEMPORARY: iterate on the new portfolio-notebook execution on
      # every commit. Remove before merging PR #29.
      - claude/determined-ramanujan-YCitT

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-notebooks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate & execute factor notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      UNRAVEL_API_KEY: ${{ secrets.UNRAVEL_API_KEY }}
      NOTEBOOK_JOBS: '4'

    steps:
      # Pinned to v5: actions/checkout@v6 breaks the create-pull-request
      # step below with `remote: Duplicate header: "Authorization"` (HTTP
      # 400). Revert to @v6 once the upstream incompatibility is fixed.
      # https://github.com/peter-evans/create-pull-request/issues/4272
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$UNRAVEL_API_KEY" ]; then
            echo "::error::UNRAVEL_API_KEY secret is not configured"
            exit 1
          fi

      # TEMPORARY: factor notebooks didn't change in PR #29, so we skip
      # the (slow, 100+ min) factor-notebook regen on this PR branch to
      # keep iteration on the portfolio pipeline tight. Remove before
      # merging.
      - name: Generate and execute factor notebooks
        if: ${{ github.ref_name != 'claude/determined-ramanujan-YCitT' }}
        run: python -m scripts.generate_factor_notebooks --execute

      - name: Generate and execute per-portfolio replication notebooks
        # --execute runs each portfolio's substituted notebook against
        # the live Unravel API so the committed .ipynb carries real
        # backtest outputs (equity curve, heatmap, exposure). Without
        # this every notebook would commit with empty cells — readers
        # browsing on GitHub would see only the code, no plots.
        run: python -m scripts.generate_portfolio_notebooks --execute

      - name: Upload notebooks artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebooks
          path: notebooks/
          if-no-files-found: error

      - name: Upload execution diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-diagnostics
          path: ci-artifacts/
          if-no-files-found: ignore

      - name: Commit executed notebooks back to the branch
        if: ${{ always() && github.event_name == 'push' && github.ref_name != 'main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage README.md too — both notebook generators rewrite their
          # own README table block (factor / portfolio) in-place.
          git add notebooks/ README.md
          if git diff --cached --quiet; then
            echo "No notebook changes to commit."
            exit 0
          fi
          git commit -m "chore(Notebooks): Regenerate and execute notebooks

          Branch: ${GITHUB_REF_NAME}
          Triggered by: ${GITHUB_ACTOR}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Open PR with refreshed notebooks
        if: ${{ success() && (github.event_name != 'push' || github.ref_name == 'main') }}
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: automation/refresh-notebooks
          add-paths: |
            notebooks/
            README.md
          commit-message: "chore(Notebooks): Regenerate and execute notebooks"
          title: "chore(Notebooks): Refresh factor & portfolio notebooks"
          body: |
            Automated regeneration of the factor AlphaLens notebooks
            (`factor_analysis_<id>.ipynb`) and the per-portfolio
            replication notebooks (`portfolio_replication_<id>.ipynb`),
            both executed against the live Unravel API so committed
            outputs match the substituted parameters.

            Trigger: `${{ github.event_name }}`.
          delete-branch: true
