name: Generate Notebooks

on:
  workflow_dispatch:

  schedule:
    - cron: '0 6 * * 1'

  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-notebooks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate & execute factor notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      UNRAVEL_API_KEY: ${{ secrets.UNRAVEL_API_KEY }}
      NOTEBOOK_JOBS: '4'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$UNRAVEL_API_KEY" ]; then
            echo "::error::UNRAVEL_API_KEY secret is not configured"
            exit 1
          fi

      - name: Generate and execute notebooks
        run: python -m scripts.generate_factor_notebooks --execute

      - name: Upload notebooks artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebooks
          path: notebooks/
          if-no-files-found: error

      - name: Upload execution diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-diagnostics
          path: ci-artifacts/
          if-no-files-found: ignore

      - name: Commit executed notebooks back to the branch
        if: ${{ always() && github.event_name == 'push' && github.ref_name != 'main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notebooks/
          if git diff --cached --quiet; then
            echo "No notebook changes to commit."
            exit 0
          fi
          git commit -m "chore(Notebooks): Regenerate and execute factor notebooks

          Branch: ${GITHUB_REF_NAME}
          Triggered by: ${GITHUB_ACTOR}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Open PR with refreshed notebooks
        if: ${{ success() && (github.event_name != 'push' || github.ref_name == 'main') }}
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: automation/refresh-notebooks
          add-paths: notebooks/
          commit-message: "chore(Notebooks): Regenerate and execute factor notebooks"
          title: "chore(Notebooks): Refresh factor analysis notebooks"
          body: |
            Automated regeneration of the factor notebooks from
            `scripts/factors_catalog.py`, executed against the live Unravel API.

            Trigger: `${{ github.event_name }}`.
          delete-branch: true
