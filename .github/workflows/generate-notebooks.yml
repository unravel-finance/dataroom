name: Generate Notebooks

# Regenerates the per-factor AlphaLens notebooks (and the all-factor returns
# correlation notebook) from factsheet-content/factors.yaml, EXECUTES them
# against the live Unravel API so the committed .ipynb files carry real
# outputs, and publishes the refreshed notebooks/ tree.
#
# Delivery depends on the trigger:
#   * push to the dev branch  -> commit the executed notebooks straight back
#     to that branch (fast iteration; keeps this PR green and reviewable).
#   * schedule / dispatch / push to main -> open a PR into `main` with the
#     refreshed notebooks/ tree for a human to review and merge.
#
# The scheduled `cron` is the steady-state cadence; it only fires from the
# copy of this file on the default branch, so it will not run until this is
# merged to main.
#
# TEMPORARY: the dev-branch `push` entry runs the whole pipeline on every
# commit of this PR so we can verify the generator end to end. Remove that
# one line before merging to main (the catalog at that point only changes
# via `factsheet-content/factors.yaml`, so add a `paths:` filter then if a
# tighter trigger is wanted -- the regen is idempotent, so extra no-op runs
# are harmless).

on:
  workflow_dispatch:

  schedule:
    # Mondays 06:00 UTC -- weekly steady-state regeneration PR.
    - cron: '0 6 * * 1'

  push:
    branches:
      - main
      # TEMPORARY: verify the generator on every commit of this PR.
      # Remove before merging to main.
      - claude/add-alphalens-yaml-config-2GlKg

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate & execute factor notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      UNRAVEL_API_KEY: ${{ secrets.UNRAVEL_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$UNRAVEL_API_KEY" ]; then
            echo "::error::UNRAVEL_API_KEY secret is not configured"
            exit 1
          fi

      - name: Generate and execute notebooks
        run: python -m scripts.generate_factor_notebooks --execute

      - name: Show generated notebooks
        if: always()
        run: ls -lhR notebooks || true

      - name: Upload notebooks artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebooks
          path: notebooks/
          if-no-files-found: error

      # --- delivery -------------------------------------------------------

      # Fast iteration: push to the dev branch commits the executed
      # notebooks straight back so this PR shows the real output. Runs even
      # on failure (always()) during the temporary dev-branch phase so the
      # _execution_report.md / _execution_logs are committed back for
      # diagnosis -- we cannot read Actions logs from the dev workflow.
      - name: Commit executed notebooks back to the branch
        if: ${{ always() && github.event_name == 'push' && github.ref_name != 'main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notebooks/
          if git diff --cached --quiet; then
            echo "No notebook changes to commit."
            exit 0
          fi
          git commit -m "chore(Notebooks): Regenerate and execute factor notebooks

          Generated by .github/workflows/generate-notebooks.yml
          Branch: ${GITHUB_REF_NAME}
          Triggered by: ${GITHUB_ACTOR}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      # Steady state: scheduled / manual / push-to-main runs open a PR into
      # main for a human to review the regenerated notebooks/ diff.
      - name: Open PR with refreshed notebooks
        if: ${{ success() && (github.event_name != 'push' || github.ref_name == 'main') }}
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: automation/refresh-notebooks
          add-paths: notebooks/
          commit-message: "chore(Notebooks): Regenerate and execute factor notebooks"
          title: "chore(Notebooks): Refresh factor analysis notebooks"
          body: |
            Automated regeneration of the per-factor AlphaLens notebooks and
            the all-factor returns-correlation notebook from
            `factsheet-content/factors.yaml`, executed against the live
            Unravel API.

            Trigger: `${{ github.event_name }}`. Generated by
            `.github/workflows/generate-notebooks.yml`.

            Review the regenerated `notebooks/` diff and merge manually.
          delete-branch: true
