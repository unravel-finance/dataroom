name: Generate Factsheets

# Pulls the latest portfolio returns + raw factor data for every single-factor
# portfolio, regenerates the two-page PDF factsheets, and commits the refreshed
# artefacts back to the repo. Used to populate the DocSend dataroom for the
# Unravel sales pipeline.
#
# Steady-state: manual dispatch only — the publishing cadence is set by sales.
# Temporary: also runs on push to the sales-pipeline setup branch so we can
# iterate on the design before merging. Remove the `push:` trigger before
# merging to main.

on:
  workflow_dispatch:
    inputs:
      factors:
        description: 'Space-separated factor ids to refresh (leave blank for all)'
        required: false
        default: ''
      skip_commit:
        description: 'Build artefacts without committing back to the branch'
        required: false
        type: boolean
        default: false

  # TEMPORARY: remove before merging to main — only here so we can iterate on
  # the factsheet design on the setup branch.
  push:
    branches:
      - claude/setup-unravel-sales-pipeline-F6ZSG

permissions:
  contents: write

jobs:
  generate:
    name: Export CSVs & render PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      UNRAVEL_API_KEY: ${{ secrets.UNRAVEL_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      # Inter is the body/display font for the factsheet. Without it the PDF
      # falls back to DejaVu, which reads as "designed by an engineer".
      - name: Install Inter font
        run: sudo apt-get update && sudo apt-get install -y fonts-inter

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$UNRAVEL_API_KEY" ]; then
            echo "::error::UNRAVEL_API_KEY secret is not configured"
            exit 1
          fi

      # While iterating on the design we only build one factor (retail_flow).
      # On manual dispatch the operator can override via the `factors` input,
      # including passing the empty string to mean "all".
      - name: Determine factors to build
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "factors=${{ github.event.inputs.factors }}" >> "$GITHUB_OUTPUT"
          else
            echo "factors=retail_flow" >> "$GITHUB_OUTPUT"
          fi

      - name: Export CSVs (returns + factor data)
        run: python -m scripts.export_data ${{ steps.scope.outputs.factors }}

      - name: Generate PDF factsheets
        run: python -m scripts.generate_factsheets ${{ steps.scope.outputs.factors }}

      - name: Show generated artefacts
        run: |
          echo "Returns:"; ls -lh data/returns || true
          echo; echo "Factor data:"; ls -lh data/factors || true
          echo; echo "Factsheets:"; ls -lh data/factsheets || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: factsheets
          path: |
            data/returns
            data/factors
            data/factsheets
          if-no-files-found: error

      - name: Commit refreshed data back to the branch
        if: ${{ github.event.inputs.skip_commit != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first, then check if anything is actually staged — this
          # catches *untracked* new files (the first run creates data/* from
          # scratch; `git diff` alone misses those).
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(Sales): Refresh factsheet CSVs and PDFs

          Generated by .github/workflows/generate-factsheets.yml
          Branch: ${GITHUB_REF_NAME}
          Triggered by: ${GITHUB_ACTOR}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
