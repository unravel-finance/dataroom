name: Generate Factsheets

on:
  workflow_dispatch:
    inputs:
      factors:
        description: 'Space-separated factor ids to refresh (leave blank for all)'
        required: false
        default: ''
      skip_commit:
        description: 'Build artefacts only — no commit and no PR'
        required: false
        type: boolean
        default: false

  schedule:
    - cron: '0 6 * * 1'

  push:
    branches:
      - main
      # TEMPORARY: iterate on the new multi-factor portfolio pipeline on
      # every commit. Remove this branch entry before merging PR #29.
      - claude/determined-ramanujan-YCitT

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-factsheets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Export CSVs & render PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      UNRAVEL_API_KEY: ${{ secrets.UNRAVEL_API_KEY }}

    steps:
      # Pinned to v5: actions/checkout@v6 breaks the create-pull-request
      # step below with `remote: Duplicate header: "Authorization"` (HTTP
      # 400). Revert to @v6 once the upstream incompatibility is fixed.
      # https://github.com/peter-evans/create-pull-request/issues/4272
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      # Defensive fallback only — Mona Sans (the brand font) is bundled in
      # scripts/factsheet/assets/fonts/; without any sans the PDF hits DejaVu.
      - name: Install Inter font
        run: sudo apt-get update && sudo apt-get install -y fonts-inter

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$UNRAVEL_API_KEY" ]; then
            echo "::error::UNRAVEL_API_KEY secret is not configured"
            exit 1
          fi

      - name: Determine factors to build
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "factors=${{ github.event.inputs.factors }}" >> "$GITHUB_OUTPUT"
          else
            echo "factors=" >> "$GITHUB_OUTPUT"
          fi

      # TEMPORARY: factor scripts didn't change in PR #29, so we skip
      # regenerating them on the PR branch to keep the iteration loop on
      # the portfolio pipeline tight. Remove this guard before merging.
      - name: Export CSVs (returns + factor data)
        if: ${{ github.ref_name != 'claude/determined-ramanujan-YCitT' }}
        run: python -m scripts.export_data ${{ steps.scope.outputs.factors }}

      - name: Generate PDF factsheets
        if: ${{ github.ref_name != 'claude/determined-ramanujan-YCitT' }}
        run: python -m scripts.generate_factsheets ${{ steps.scope.outputs.factors }}

      - name: Export portfolio returns CSVs
        run: python -m scripts.export_portfolio_returns

      - name: Generate portfolio PDF factsheets
        run: python -m scripts.generate_portfolio_factsheets

      # Per-portfolio replication notebooks (.ipynb) are generated AND
      # executed by .github/workflows/generate-notebooks.yml instead —
      # same pattern as the single-factor AlphaLens notebooks. Keeping
      # that work out of the factsheet refresh keeps this workflow fast.

      - name: Show generated artefacts
        run: |
          echo "Returns:"; ls -lh data/portfolio-40-returns || true
          echo; echo "Factor data:"; ls -lh data/raw-factors || true
          echo; echo "Factsheets:"; ls -lh factsheets || true
          echo; echo "Previews:"; ls -lh notebooks/preview || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: factsheets
          path: |
            data/portfolio-40-returns
            data/raw-factors
            factsheets
            notebooks/preview
          if-no-files-found: error

      - name: Commit refreshed data back to the branch
        if: ${{ github.event_name == 'push' && github.ref_name != 'main' && github.event.inputs.skip_commit != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage before the diff check so first-run untracked dirs count.
          git add data/ factsheets/ notebooks/preview/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(Sales): Refresh factsheet CSVs and PDFs

          Generated by .github/workflows/generate-factsheets.yml
          Branch: ${GITHUB_REF_NAME}
          Triggered by: ${GITHUB_ACTOR}"
          # Rebase before pushing — the sibling generate-notebooks
          # workflow may have landed a notebooks/ commit to the same
          # ref while this one was running. The two workflows touch
          # disjoint paths so rebase is conflict-free.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Open PR with refreshed data
        if: ${{ (github.event_name != 'push' || github.ref_name == 'main') && github.event.inputs.skip_commit != 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: automation/refresh-factsheets
          add-paths: |
            data/
            factsheets/
            notebooks/preview/
          commit-message: "chore(Sales): Refresh factsheet CSVs and PDFs"
          title: "chore(Sales): Weekly factsheet data refresh"
          body: |
            Automated refresh of the sales data-room artefacts — daily
            returns CSVs, raw factor-data CSVs, the rendered two-page
            PDF factsheets, and the per-factor preview PNGs
            (notebooks/preview/) — for **all factors**.

            Trigger: `${{ github.event_name }}`. Generated by
            `.github/workflows/generate-factsheets.yml`.

            Review the regenerated `data/`, `factsheets/` and
            `notebooks/preview/` diff and merge manually.
          delete-branch: true
