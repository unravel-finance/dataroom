name: Generate Factsheets

# Pulls the latest portfolio returns + raw factor data for every single-factor
# portfolio, regenerates the two-page PDF factsheets, and commits the refreshed
# artefacts back to the repo. Used to populate the DocSend dataroom for the
# Unravel sales pipeline.
#
# Manual dispatch only — the publishing cadence is set by sales, not by CI.

on:
  workflow_dispatch:
    inputs:
      factors:
        description: 'Space-separated factor ids to refresh (leave blank for all)'
        required: false
        default: ''
      skip_commit:
        description: 'Build artefacts without committing back to the branch'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    name: Export CSVs & render PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      UNRAVEL_API_KEY: ${{ secrets.UNRAVEL_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$UNRAVEL_API_KEY" ]; then
            echo "::error::UNRAVEL_API_KEY secret is not configured"
            exit 1
          fi

      - name: Export CSVs (returns + factor data)
        run: python -m scripts.export_data ${{ github.event.inputs.factors }}

      - name: Generate PDF factsheets
        run: python -m scripts.generate_factsheets ${{ github.event.inputs.factors }}

      - name: Show generated artefacts
        run: |
          echo "Returns:"; ls -lh data/returns || true
          echo; echo "Factor data:"; ls -lh data/factors || true
          echo; echo "Factsheets:"; ls -lh data/factsheets || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: factsheets
          path: |
            data/returns
            data/factors
            data/factsheets
          if-no-files-found: error

      - name: Commit refreshed data back to the branch
        if: ${{ github.event.inputs.skip_commit != 'true' }}
        run: |
          if git diff --quiet -- data/; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore(Sales): Refresh factsheet CSVs and PDFs

          Generated by .github/workflows/generate-factsheets.yml
          Branch: ${GITHUB_REF_NAME}
          Triggered by: ${GITHUB_ACTOR}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
