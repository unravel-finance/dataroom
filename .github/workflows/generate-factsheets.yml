name: Generate Factsheets

# Pulls the latest portfolio returns + raw factor data for every single-factor
# portfolio, regenerates the two-page PDF factsheets, and publishes the
# refreshed artefacts. Used to populate the DocSend dataroom for the Unravel
# sales pipeline.
#
# Delivery depends on the trigger:
#   • schedule / workflow_dispatch → opens a PR into `main` with the refreshed
#     data/ tree, for a human to review and merge (the steady-state cadence).
#   • push to the setup branch → commits straight back to that branch, so we
#     can iterate on the factsheet design quickly before merging to main.
#
# NOTE: the weekly `schedule:` trigger only fires from the copy of this file
# on the default branch — it will not run until this workflow is merged to
# main. TEMPORARY: remove the `push:` trigger (and this note) before merging.

on:
  workflow_dispatch:
    inputs:
      factors:
        description: 'Space-separated factor ids to refresh (leave blank for all)'
        required: false
        default: ''
      skip_commit:
        description: 'Build artefacts only — no commit and no PR'
        required: false
        type: boolean
        default: false

  schedule:
    # Mondays 06:00 UTC — weekly data-room refresh PR.
    - cron: '0 6 * * 1'

  # TEMPORARY: remove before merging to main — only here so we can iterate on
  # the factsheet design on the setup branch.
  push:
    branches:
      - claude/setup-unravel-sales-pipeline-F6ZSG

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Export CSVs & render PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      UNRAVEL_API_KEY: ${{ secrets.UNRAVEL_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      # Inter is the body/display font for the factsheet. Without it the PDF
      # falls back to DejaVu, which reads as "designed by an engineer".
      - name: Install Inter font
        run: sudo apt-get update && sudo apt-get install -y fonts-inter

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$UNRAVEL_API_KEY" ]; then
            echo "::error::UNRAVEL_API_KEY secret is not configured"
            exit 1
          fi

      # All factors by default. Only a manual dispatch can narrow the scope
      # via the `factors` input; schedule and push always build everything.
      - name: Determine factors to build
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "factors=${{ github.event.inputs.factors }}" >> "$GITHUB_OUTPUT"
          else
            echo "factors=" >> "$GITHUB_OUTPUT"
          fi

      - name: Export CSVs (returns + factor data)
        run: python -m scripts.export_data ${{ steps.scope.outputs.factors }}

      - name: Generate PDF factsheets
        run: python -m scripts.generate_factsheets ${{ steps.scope.outputs.factors }}

      - name: Show generated artefacts
        run: |
          echo "Returns:"; ls -lh data/returns || true
          echo; echo "Factor data:"; ls -lh data/factors || true
          echo; echo "Factsheets:"; ls -lh data/factsheets || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: factsheets
          path: |
            data/returns
            data/factors
            data/factsheets
          if-no-files-found: error

      # --- delivery -------------------------------------------------------

      # Fast iteration loop: push to the setup branch commits straight back.
      - name: Commit refreshed data back to the branch
        if: ${{ github.event_name == 'push' && github.event.inputs.skip_commit != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first, then check if anything is actually staged — this
          # catches *untracked* new files (the first run creates data/* from
          # scratch; `git diff` alone misses those).
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(Sales): Refresh factsheet CSVs and PDFs

          Generated by .github/workflows/generate-factsheets.yml
          Branch: ${GITHUB_REF_NAME}
          Triggered by: ${GITHUB_ACTOR}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      # Steady state: scheduled / manual runs open a PR into main for a human
      # to review the regenerated data/ diff and merge.
      - name: Open PR with refreshed data
        if: ${{ github.event_name != 'push' && github.event.inputs.skip_commit != 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: automation/refresh-factsheets
          add-paths: data/
          commit-message: "chore(Sales): Refresh factsheet CSVs and PDFs"
          title: "chore(Sales): Weekly factsheet data refresh"
          body: |
            Automated refresh of the sales data-room artefacts — daily
            returns CSVs, raw factor-data CSVs, and the rendered two-page
            PDF factsheets — for **all factors**.

            Trigger: `${{ github.event_name }}`. Generated by
            `.github/workflows/generate-factsheets.yml`.

            Review the regenerated `data/` diff and merge manually.
          delete-branch: true
